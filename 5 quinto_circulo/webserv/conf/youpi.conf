server {
    listen 8080;
    host 127.0.0.1;
    server_name localhost;
    client_max_body_size 1000000000;
    location / {
        root ./www/html;
        allowed_methods GET;
        index index.html;
        autoindex off;
    }
    location *.bla {
        root ./YoupiBanane;
        allowed_methods GET POST;
        cgi_pass ./cgi_tester;
        cgi_extension .bla;
        autoindex off;
    }
    location /post_body {
        root ./www/html;
        allowed_methods POST GET;
        client_max_body_size 100;
        autoindex off;
    }
    location /directory {
        root ./www/html/YoupiBanane;
        allowed_methods GET;
        index youpi.bad_extension;
        autoindex off;
    }
}
