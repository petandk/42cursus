server {
    listen 8080;
    host 127.0.0.1;
    server_name myserver.com;

    error_page 404 /error_pages/404.html;
    error_page 500 /error_pages/500.html;

    client_max_body_size 100000000;

    location / {
        root ./www/html;
        allowed_methods GET;
        index index.html;
    }

    location *.bla {
        root ./YoupiBanane;
        allowed_methods GET POST;
        cgi_pass ./cgi_test;
        cgi_extension .bla;
    }

    location /post_body {
        root ./www;
        allowed_methods POST;
        client_max_body_size 100;
    }

    location /directory {
        root ./YoupiBanane;
        allowed_methods GET;
        index youpi.bad_extension;
    }
}
